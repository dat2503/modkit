# .codecov.yml
# Generated by modkit cicd module — compliance posture: startup
coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 2%    # allow 2% drop before failing
    patch:
      default:
        target: 60%

comment:
  layout: "reach,diff,flags"
  behavior: default
  require_changes: true   # only comment if coverage changed
