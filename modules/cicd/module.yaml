name: "cicd"
version: "1.0.0"
description: "CI/CD pipeline configuration. Generates GitHub Actions workflows for build, test, lint, staging deploy, and production deploy. Generated automatically by 'modkit init'."
category: "cicd"
phase: "mvp"
always_include: false

interface_go: "contracts/go/cicd.go"
interface_ts: "contracts/ts/cicd.ts"

config_schema: "modules/cicd/config.schema.json"
agent_docs: "modules/cicd/docs/AGENT.md"

default_impl: "github-actions"

dependencies:
  required: []
  optional: []

include_when:
  - "always — generated by modkit init for every project"

implementations:
  - name: github-actions
    label: "GitHub Actions"
    phase: mvp
    runtimes:
      go: "modules/cicd/impl/github-actions-go"
      bun: "modules/cicd/impl/github-actions-ts"
    notes: "Default. Generates .github/workflows/ directory with CI, staging deploy, and production deploy workflows."
