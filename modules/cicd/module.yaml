name: "cicd"
version: "1.0.0"
description: "CI/CD pipeline configuration. Generates deployment config and GitHub Actions workflows for build, test, and deploy. Supports GitHub Actions (Docker), Vercel, and Railway. Generated automatically by 'modkit init'."
category: "cicd"
phase: "mvp"
always_include: false

interface_go: "contracts/go/cicd.go"
interface_ts: "contracts/ts/cicd.ts"

config_schema: "modules/cicd/config.schema.json"
agent_docs: "modules/cicd/docs/AGENT.md"

default_impl: "github-actions"

dependencies:
  required: []
  optional: []

include_when:
  - "always — generated by modkit init for every project"

implementations:
  - name: github-actions
    label: "GitHub Actions"
    phase: mvp
    runtimes:
      go: "modules/cicd/impl/github-actions-go"
      bun: "modules/cicd/impl/github-actions-ts"
    notes: "Default. Generates .github/workflows/ with CI, staging deploy, and production deploy. Uses Docker + self-managed infra."

  - name: vercel
    label: "Vercel"
    phase: mvp
    runtimes:
      go: "modules/cicd/impl/vercel-go"
      bun: "modules/cicd/impl/vercel-ts"
    notes: "Generates vercel.json + GitHub Actions CI + Vercel CLI production deploy on push to main. Best for Bun/Next.js frontends. Requires VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID as GitHub secrets."

  - name: railway
    label: "Railway"
    phase: mvp
    runtimes:
      go: "modules/cicd/impl/railway-go"
      bun: "modules/cicd/impl/railway-ts"
    notes: "Generates railway.toml + GitHub Actions CI + Railway CLI deploy on push to main. Railway provisions Postgres and Redis automatically via dashboard. Requires RAILWAY_TOKEN as a GitHub secret."
